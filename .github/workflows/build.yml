name: Build & Package

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup MSVC
        uses: egor-tensin/vs-shell@v2
        with:
          arch: x64

      - name: Configure
        run: cmake --preset ci

      - name: Build Release
        run: cmake --build build/ci --config Release

      - name: Run tests
        run: ctest --test-dir build/ci -C Release --output-on-failure

      - name: Prepare artifact
        run: |
          mkdir artifact\WavTool
          mkdir artifact\WavTool\bin
          mkdir artifact\WavTool\src
          mkdir artifact\WavTool\tests
          copy CLAUDE.md artifact\WavTool\
          copy CMakeLists.txt artifact\WavTool\
          copy CMakePresets.json artifact\WavTool\
          copy main.cpp artifact\WavTool\
          copy README.md artifact\WavTool\
          copy src\*.h artifact\WavTool\src\
          copy src\*.cpp artifact\WavTool\src\
          copy tests\* artifact\WavTool\tests\
          copy build\ci\wav_tool.exe artifact\WavTool\bin\
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: WavTool-Release
          path: artifact/WavTool/
          retention-days: 90
